<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <title>Octo Control — Select Your Pillow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #F9A825;
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --muted: #9a9895;
      --tr: 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }

    /* ─── BG ─────────────────────────────────────────── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('assets/images/fundo-chevron.jpg');
      background-size: cover; background-position: center top;
      opacity: 1;
      animation: bgDrift 18s linear infinite;
    }
    @keyframes bgDrift {
      0%   { background-position: center 0%; }
      100% { background-position: center 100%; }
    }
    .bg-layer::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
    }
    .bg-bloom {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 80%; height: 80%;
      background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 65%);
      opacity: 0.04; z-index: 1; pointer-events: none;
      filter: blur(80px);
      transition: background 0.8s ease, opacity 0.6s ease;
    }

    /* ─── SCANLINES ──────────────────────────────────── */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 300;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px
      );
    }

    /* ─── LOADING ────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
      background-image: url('assets/images/fundo-chevron.jpg');
      background-size: cover; background-position: center;
      animation: bgDrift 18s linear infinite;
    }
    .loading-screen::before {
      content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    }
    .loading-logo {
      position: relative; z-index: 1; height: 80px;
      animation: logoPulse 0.9s ease-in-out infinite;
    }
    .loading-press {
      position: relative; z-index: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--muted); letter-spacing: 0.2em;
      animation: blink 1.1s step-start infinite;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 0px  rgba(249,168,37,0)); }
      50%       { transform: scale(1.12); filter: drop-shadow(0 0 28px rgba(249,168,37,0.6)); }
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .loading-screen.fade-out { animation: loadFade 0.55s ease forwards !important; }
    @keyframes loadFade { to { opacity: 0; pointer-events: none; } }

    /* ─── SELECTION FLASH ────────────────────────────── */
    .sel-flash {
      position: fixed; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 400;
      transition: opacity 0.12s ease;
    }

    /* ─── NAV ────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 18px 52px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
      overflow: visible;
    }
    .nav-logo { overflow: visible; position: relative; z-index: 55; }
    .nav-logo img {
      height: 36px; display: block;
      transform: scale(2.1) translateY(45%);
      transform-origin: left center;
    }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-counter { font-size: 11px; letter-spacing: 0.1em; color: #444; font-weight: 500; }
    .nav-counter span { color: var(--accent); }

    /* ─── ARENA ──────────────────────────────────────── */
    .arena {
      position: fixed;
      top: 70px; left: 0; right: 0; bottom: 180px;
      z-index: 5;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── COVERFLOW ──────────────────────────────────── */
    .coverflow-area {
      position: absolute; inset: 0;
      perspective: 1100px;
      perspective-origin: 50% 50%;
      overflow: hidden;
    }
    .coverflow-item {
      position: absolute;
      left: 50%; top: 50%;
      transform: translateX(-50%) translateY(-50%);
      cursor: pointer;
      transition: transform var(--tr), opacity var(--tr), filter var(--tr), z-index 0s;
      will-change: transform, opacity, filter;
    }
    .coverflow-item img {
      display: block; height: 64vh; width: auto;
      object-fit: contain;
      pointer-events: none; user-select: none;
      filter: drop-shadow(0 24px 60px rgba(0,0,0,0.85));
    }
    .coverflow-item.active img {
      animation: pillowFloat 5s ease-in-out infinite;
    }
    @keyframes pillowFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33%       { transform: translateY(-14px) rotate(0.4deg); }
      66%       { transform: translateY(-8px) rotate(-0.4deg); }
    }
    /* Glow ring on active */
    .coverflow-item.active::after {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, var(--accent) 0%, transparent 70%);
      opacity: 0.12; filter: blur(30px);
      pointer-events: none; z-index: -1;
      transition: background 0.6s ease;
    }

    /* ─── HUD PANEL ──────────────────────────────────── */
    .hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 24px 36px 28px;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
      transition: opacity 0.2s ease, transform 0.2s ease;
      display: flex; flex-direction: column; align-items: center;
    }
    .hud { transition: none; }

    .hud-player {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; letter-spacing: 0.2em;
      color: var(--accent); margin-bottom: 10px;
      text-transform: uppercase;
    }
    .hud-player span { color: var(--muted); }

    .hud-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--muted);
      letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .hud-tag::before {
      content: ''; display: block; width: 22px; height: 1px;
      background: var(--accent);
    }
    .hud-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 4.5vw, 68px);
      line-height: 0.9; color: var(--text);
      letter-spacing: 0.01em; margin-bottom: 14px;
    }
    .hud-desc {
      font-family: 'Press Start 2P', monospace;
      font-size: 6.5px; line-height: 2.1;
      color: var(--muted); margin-bottom: 20px;
      max-width: 300px;
    }

    /* STATS */
    .stats { display: flex; flex-direction: column; gap: 8px; width: 320px; }
    .stat-row { display: flex; align-items: center; gap: 10px; }
    .stat-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 5.5px; color: var(--muted);
      text-transform: uppercase; width: 36px; flex-shrink: 0;
    }
    .stat-bar {
      flex: 1; height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }
    .stat-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; width: 0%;
      transition: width 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s,
                  background 0.5s ease;
    }
    .stat-val {
      font-family: 'Press Start 2P', monospace;
      font-size: 5.5px; color: var(--accent);
      width: 24px; text-align: right; flex-shrink: 0;
      transition: color 0.5s ease;
    }

    /* PRICE + CTA */
    .hud-footer { display: flex; align-items: center; gap: 20px; }
    .hud-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 0.04em; color: var(--text);
    }
    .hud-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--bg); background: var(--accent);
      border: none; cursor: pointer;
      padding: 10px 16px; border-radius: 2px;
      transition: transform 0.15s, box-shadow 0.15s, background 0.5s ease;
      /* pixel border */
      box-shadow:
        2px 0 0 0 rgba(0,0,0,0.6),
        -2px 0 0 0 rgba(255,255,255,0.15),
        0 2px 0 0 rgba(0,0,0,0.6);
    }
    .hud-cta:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5),
        2px 0 0 0 rgba(0,0,0,0.6),
        -2px 0 0 0 rgba(255,255,255,0.15);
    }
    .hud-cta:active { transform: translateY(0) scale(0.98); }

    /* ─── ARROWS ──────────────────────────────────────── */
    .arena-arrow {
      position: fixed; top: 50%; z-index: 40;
      transform: translateY(-50%);
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted); font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .arena-arrow:hover { background: rgba(255,255,255,0.1); color: var(--text); transform: translateY(-50%) scale(1.08); }
    .arena-arrow.left  { left: 28px; }
    .arena-arrow.right { right: 28px; }

    /* ─── SELECT LABEL ───────────────────────────────── */
    .select-label {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 40; text-align: center; pointer-events: none;
    }
    .select-label span {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
      opacity: 0.6;
    }

    /* ─── DOTS ────────────────────────────────────────── */
    .dots {
      position: fixed; bottom: 175px; left: 50%; transform: translateX(-50%);
      z-index: 40; display: flex; gap: 10px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer; transition: all 0.3s;
    }
    .dot.active {
      background: var(--accent);
      transform: scale(1.4);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ─── KEYBOARD HINT ──────────────────────────────── */
    .kb-hint {
      position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
      z-index: 40; display: flex; align-items: center; gap: 8px; opacity: 0.3;
      pointer-events: none;
    }
    .key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 18px;
      border: 1px solid #444; border-radius: 3px;
      font-size: 10px; color: var(--muted);
    }
    .kb-hint span { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 900px) {
      nav { padding: 16px 24px; justify-content: center; }
      .nav-links, .nav-counter { display: none; }
      .nav-logo img { transform: scale(1.95) translateY(45%); transform-origin: center center; }
      .hud { width: 100%; border-radius: 0; border-right: none; padding: 20px 24px 28px; }
      .hud-name { font-size: 36px; }
      .coverflow-item img { height: 44vh; }
      .arena-arrow { width: 44px; height: 44px; font-size: 16px; }
      .arena-arrow.left  { left: 12px; }
      .arena-arrow.right { right: 12px; }
    }
  </style>
</head>
<body>

<!-- Fixed BG -->
<div class="bg-layer"></div>
<div class="bg-bloom" id="bgBloom"></div>

<!-- Scanlines overlay -->
<div class="scanlines"></div>

<!-- Selection flash -->
<div class="sel-flash" id="selFlash"></div>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <img class="loading-logo" src="assets/images/logoocto.png" alt="Octo Control">
  <div class="loading-press">PRESS START</div>
</div>

<!-- Nav -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="assets/images/logoocto.png" alt="Octo Control">
  </a>
</nav>


<!-- Arena -->
<div class="arena">
  <div class="coverflow-area" id="coverflowArea">
    <!-- items injected by JS -->
  </div>
</div>

<!-- HUD Panel -->
<div class="hud" id="hud">
  <div class="hud-tag" id="hudTag"></div>
  <div class="hud-name" id="hudName"></div>
  <div class="hud-desc" id="hudDesc"></div>
  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">VIBE</span>
      <div class="stat-bar"><div class="stat-fill" id="statVibe"></div></div>
      <span class="stat-val" id="statVibeVal"></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">DROP</span>
      <div class="stat-bar"><div class="stat-fill" id="statDrop"></div></div>
      <span class="stat-val" id="statDropVal"></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">FEEL</span>
      <div class="stat-bar"><div class="stat-fill" id="statFeel"></div></div>
      <span class="stat-val" id="statFeelVal"></span>
    </div>
  </div>
</div>

<!-- Navigation arrows -->
<button class="arena-arrow left" id="arrowLeft">&#8592;</button>
<button class="arena-arrow right" id="arrowRight">&#8594;</button>

<!-- Dots -->
<!-- Keyboard hint -->
<div class="kb-hint">
  <span class="key">&#8592;</span>
  <span class="key">&#8594;</span>
  <span>navegar</span>
</div>

<script>
const PRODUCTS = [
  { id: 'snes_fever',          name: 'SNES Fever',         universe: 'Gaming Retro',          price: 'R$ 30,50', desc: 'A nostalgia do Super Nintendo\nnuma almofada que aquece\nqualquer sofá gamer.',           accent: '#E53935', vibe: 95, drop: 90, feel: 88 },
  { id: 'power_up',            name: 'Power Up',           universe: 'Gaming Retro',          price: 'R$ 30,50', desc: 'Coletaste todos os itens.\nAgora é hora de colecionar\nesta.',                           accent: '#43A047', vibe: 88, drop: 82, feel: 85 },
  { id: 'blazing_genesis',     name: 'Blazing Genesis',    universe: 'Gaming Retro',          price: 'R$ 30,50', desc: 'O legado do Mega Drive,\nreinterpretado com\natitude máxima.',                          accent: '#1E88E5', vibe: 85, drop: 80, feel: 85 },
  { id: 'no_play_no_gain_xbox',name: 'No Play No Gain',    universe: 'Xbox',                  price: 'R$ 30,50', desc: 'Sem jogo não há ganho.\nPara os guerreiros do\ncontrolo verde.',                         accent: '#2E7D32', vibe: 92, drop: 88, feel: 85 },
  { id: 'triforce',            name: 'Triforce',           universe: 'The Legend of Zelda',   price: 'R$ 30,50', desc: 'Coragem, Poder e Sabedoria\nreunidos na almofada mais\népica de Hyrule.',                 accent: '#F9A825', vibe: 98, drop: 95, feel: 88 },
  { id: 'selfie',              name: 'Selfie',             universe: 'Adventure Time',        price: 'R$ 30,50', desc: 'Finn e Jake querem\naparecer no teu feed.\nHora de aventura.',                          accent: '#F5C400', vibe: 87, drop: 78, feel: 85 },
  { id: 'poptime',             name: 'Poptime',            universe: 'Adventure Time',        price: 'R$ 30,50', desc: 'Pop, colorido e cheio de\npersonalidade — exatamente\ncomo o Land of Ooo.',              accent: '#E91E8C', vibe: 90, drop: 75, feel: 86 }
];

// ── DOM ──────────────────────────────────────────────
const loadingScreen  = document.getElementById('loadingScreen');
const bgBloom        = document.getElementById('bgBloom');
const selFlash       = document.getElementById('selFlash');
const coverflowArea  = document.getElementById('coverflowArea');
const hud            = document.getElementById('hud');
const hudTag         = document.getElementById('hudTag');
const hudName        = document.getElementById('hudName');
const hudDesc        = document.getElementById('hudDesc');
const statVibe       = document.getElementById('statVibe');
const statDrop       = document.getElementById('statDrop');
const statFeel       = document.getElementById('statFeel');
const statVibeVal    = document.getElementById('statVibeVal');
const statDropVal    = document.getElementById('statDropVal');
const statFeelVal    = document.getElementById('statFeelVal');
const arrowLeft      = document.getElementById('arrowLeft');
const arrowRight     = document.getElementById('arrowRight');

// ── State ─────────────────────────────────────────────
let current = 0;
let isAnimating = false;

// ── Build coverflow items ─────────────────────────────
const items = [];

PRODUCTS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'coverflow-item';
  el.dataset.index = i;
  el.innerHTML = `<img src="assets/images/produtos/${p.id}.png?v=2" alt="${p.name}" loading="lazy">`;
  el.addEventListener('click', () => { if (i !== current) goTo(i); });
  coverflowArea.appendChild(el);
  items.push(el);
});


// ── Coverflow transform logic ─────────────────────────
function getTransformParams(offset) {
  const abs = Math.abs(offset);
  const sign = Math.sign(offset) || 1;
  const spacing = 22; // vw per step

  if (abs === 0) return { x: 0,              rotY: 0,            scale: 1.15, z: 20, opacity: 1,    bright: 1 };
  if (abs === 1) return { x: sign * spacing * 1,  rotY: -sign * 26,   scale: 0.78, z: 16, opacity: 0.88, bright: 0.75 };
  if (abs === 2) return { x: sign * spacing * 1.9, rotY: -sign * 42,   scale: 0.6,  z: 12, opacity: 0.65, bright: 0.55 };
  if (abs === 3) return { x: sign * spacing * 2.6, rotY: -sign * 52,   scale: 0.46, z: 8,  opacity: 0.4,  bright: 0.4 };
  return               { x: sign * spacing * 3.2, rotY: -sign * 58,   scale: 0.35, z: 4,  opacity: 0.18, bright: 0.3 };
}

function updateCarousel(animated = true) {
  const p = PRODUCTS[current];

  // Update CSS accent var
  document.documentElement.style.setProperty('--accent', p.accent);

  // Update bloom
  bgBloom.style.background = `radial-gradient(ellipse at center, ${p.accent} 0%, transparent 65%)`;
  bgBloom.style.opacity = '0.06';

  // Update counter

  // Position all items
  items.forEach((el, i) => {
    const offset = i - current;
    const t = getTransformParams(offset);
    const isActive = offset === 0;

    el.style.transition = animated ? `transform var(--tr), opacity var(--tr), filter var(--tr)` : 'none';
    el.style.transform = `translateX(calc(-50% + ${t.x}vw)) translateY(-52%) rotateY(${t.rotY}deg) scale(${t.scale})`;
    el.style.zIndex = t.z;
    el.style.opacity = t.opacity;
    el.style.filter = `brightness(${t.bright}) drop-shadow(0 24px 60px rgba(0,0,0,0.85))`;
    el.style.cursor = isActive ? 'default' : 'pointer';

    if (isActive) {
      el.classList.add('active');
      // Active glow color
      el.style.setProperty('--accent', p.accent);
    } else {
      el.classList.remove('active');
    }
  });

}

function updateHUD(animated = true) {
  const p = PRODUCTS[current];

  const doUpdate = () => {
    hudTag.textContent = p.universe;
    hudName.textContent = p.name;
    hudDesc.textContent = p.desc;
    // Reset stat bars before animating
    statVibe.style.width = '0%';
    statDrop.style.width = '0%';
    statFeel.style.width = '0%';
    statVibeVal.textContent = '';
    statDropVal.textContent = '';
    statFeelVal.textContent = '';

    // Animate stat fills after tiny delay
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        statVibe.style.width = p.vibe + '%';
        statDrop.style.width = p.drop + '%';
        statFeel.style.width = p.feel + '%';
        statVibeVal.textContent = p.vibe;
        statDropVal.textContent = p.drop;
        statFeelVal.textContent = p.feel;
        statVibe.style.background = p.accent;
        statDrop.style.background = p.accent;
        statFeel.style.background = p.accent;
        statVibeVal.style.color = p.accent;
        statDropVal.style.color = p.accent;
        statFeelVal.style.color = p.accent;
      });
    });

    hud.classList.remove('exiting');
    hud.classList.add('entering');
  };

  doUpdate();
}

function goTo(idx, animate = true) {
  if (idx === current || isAnimating) return;
  isAnimating = true;
  current = ((idx % PRODUCTS.length) + PRODUCTS.length) % PRODUCTS.length;
  updateCarousel(animate);
  updateHUD(animate);
  setTimeout(() => { isAnimating = false; }, 600);
}

function prev() { goTo((current - 1 + PRODUCTS.length) % PRODUCTS.length); }
function next() { goTo((current + 1) % PRODUCTS.length); }

// ── Navigation ────────────────────────────────────────
arrowLeft.addEventListener('click', prev);
arrowRight.addEventListener('click', next);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  prev();
  if (e.key === 'ArrowRight') next();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
});

// ── Loading & init ────────────────────────────────────
// Lock body during loading
document.body.style.pointerEvents = 'none';

// Initial state (no animation)
updateCarousel(false);
updateHUD(false);

setTimeout(() => {
  loadingScreen.classList.add('fade-out');
  setTimeout(() => {
    loadingScreen.style.display = 'none';
    document.body.style.pointerEvents = '';
  }, 600);
}, 3000);
</script>
</body>
